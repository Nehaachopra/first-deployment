name: Deploy node js code on excloud

on: 
  push:
    branches: 
      - main

jobs: 
  deploy: 
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and push
        run: |
          docker build -t nehaachopra/hello-world .
          docker push nehaachopra/hello-world

      - name: Deploy on ExCloud server
        uses: appleboy/ssh-action@v1.2.2
        with: 
          host: 210.79.129.91
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # export NVM_DIR="$HOME/.nvm"
            # . "$NVM_DIR/nvm.sh"

            # cd /home/ubuntu/first-deployment

            # git pull
            # pnpm install

            # /home/ubuntu/.local/share/pnpm/bin/pm2 restart 0

            # kill the docker container
            sudo docker rm -f hello-world || true  

            # pull the updated image
            sudo docker pull nehaachopra/hello-world

            # run docker container
            sudo docker run -d \
              --name hello-world \
              -p 3000:3000 \
              nehaachopra/hello-world

            # cllean up olld / unused images
            sudo docker image prune -f