name: Deploy node js code on excloud

on: 
  push:
    branches: 
      - main

jobs: 
  deploy: 
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on ExCloud server
        uses: appleboy/ssh-action@v1.2.2
        with: 
          host: 210.79.129.91
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"

            echo "NVM_DIR=$NVM_DIR"
            ls -la "$NVM_DIR"

            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            node -v
            pnpm -v
            pm2 -v

            cd /home/ubuntu/first-deployment
            git pull
            pnpm install
            pm2 restart 0
