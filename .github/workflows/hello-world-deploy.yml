name: Deploy node js code on excloud

on: 
  push:
    branches: 
      - main

jobs: 
  deploy: 
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and push
        run: |
          docker build -t nehaachopra/hello-world .
          docker push nehaachopra/hello-world

      - name: Deploy on ExCloud server
        uses: appleboy/ssh-action@v1.2.2
        with: 
          host: 210.79.129.91
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # export NVM_DIR="$HOME/.nvm"
            # . "$NVM_DIR/nvm.sh"

            # cd /home/ubuntu/first-deployment

            # git pull
            # pnpm install

            # /home/ubuntu/.local/share/pnpm/bin/pm2 restart 0

            # Before deployment
            echo "=== BEFORE ==="
            sudo docker ps -a
            sudo docker images

            # Remove old container
            echo "=== REMOVING CONTAINER ==="
            sudo docker rm -f hello-world || true

            echo "=== AFTER REMOVE ==="
            sudo docker ps -a

            # Pull image
            echo "=== PULLING IMAGE ==="
            sudo docker pull nehaachopra/hello-world

            # Show image info
            echo "=== IMAGE INFO ==="
            sudo docker images nehaachopra/hello-world

            # Start container
            echo "=== STARTING CONTAINER ==="
            sudo docker run -d \
              --name hello-world \
              -p 3000:3000 \
              nehaachopra/hello-world

            # Verify container
            echo "=== RUNNING CONTAINERS ==="
            sudo docker ps -a

            # Show logs
            echo "=== CONTAINER LOGS ==="
            sudo docker logs hello-world || true

            # Cleanup
            echo "=== CLEANUP ==="
            sudo docker image prune -f